<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Medlean Auto Annotator</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 13px;
        width: 320px;
        background: #fff;
        color: #1a1a1a;
      }

      .header {
        background: #ff6b35;
        color: white;
        padding: 12px 16px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .header h1 { font-size: 15px; font-weight: 700; }
      .header .version { font-size: 10px; opacity: 0.8; margin-top: 2px; }

      .body { padding: 16px; }

      .status-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 12px;
        padding: 8px 10px;
        background: #f5f5f5;
        border-radius: 6px;
        font-size: 12px;
      }
      .status-dot {
        width: 8px; height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .status-dot.idle     { background: #9ca3af; }
      .status-dot.capturing{ background: #ef4444; animation: pulse 1s infinite; }
      .status-dot.analyzing{ background: #f59e0b; }
      .status-dot.done     { background: #22c55e; }
      .status-dot.error    { background: #ef4444; }

      @keyframes pulse {
        0%,100% { opacity: 1; } 50% { opacity: 0.4; }
      }

      .section { margin-bottom: 14px; }
      .section label {
        display: block;
        font-size: 11px;
        color: #6b7280;
        margin-bottom: 4px;
      }
      .section input {
        width: 100%;
        padding: 6px 8px;
        border: 1px solid #d1d5db;
        border-radius: 4px;
        font-size: 12px;
        color: #111;
        outline: none;
      }
      .section input:focus { border-color: #ff6b35; }

      .btn {
        width: 100%;
        padding: 8px;
        border: none;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s;
      }
      .btn-primary { background: #ff6b35; color: white; }
      .btn-primary:hover { background: #e55e2a; }
      .btn-primary:disabled { background: #fca589; cursor: not-allowed; }
      .btn-danger  { background: #ef4444; color: white; margin-top: 6px; }
      .btn-danger:hover  { background: #dc2626; }
      .btn-secondary { background: #f3f4f6; color: #374151; margin-top: 6px; }
      .btn-secondary:hover { background: #e5e7eb; }

      .info {
        font-size: 11px;
        color: #6b7280;
        padding: 6px 10px;
        background: #f0fdf4;
        border-radius: 4px;
        border-left: 3px solid #22c55e;
        margin-top: 8px;
      }
      .info.error {
        background: #fef2f2;
        border-color: #ef4444;
        color: #b91c1c;
      }

      .chunk-count {
        font-size: 11px;
        color: #6b7280;
        text-align: right;
        margin-top: 4px;
      }

      .settings-toggle {
        font-size: 11px;
        color: #9ca3af;
        cursor: pointer;
        text-decoration: underline;
        display: block;
        margin-top: 12px;
        text-align: center;
      }
      .settings-panel { display: none; margin-top: 8px; }
      .settings-panel.open { display: block; }
    </style>
  </head>
  <body>
    <div class="header">
      <div>
        <h1>Medlean Auto Annotator</h1>
        <div class="version">v0.1.0</div>
      </div>
    </div>

    <div class="body">
      <!-- ステータス -->
      <div class="status-row">
        <div class="status-dot idle" id="statusDot"></div>
        <span id="statusText">待機中</span>
      </div>

      <!-- Anasui タブ選択 -->
      <div class="section">
        <label>Anasui タブ (解析結果の送信先)</label>
        <select id="anasuiTabSelect" style="width:100%;padding:6px 8px;border:1px solid #d1d5db;border-radius:4px;font-size:12px;color:#111">
          <option value="">タブを選択...</option>
        </select>
      </div>

      <!-- メドレーID（任意） -->
      <div class="section">
        <label>メドレー ID (任意)</label>
        <input type="text" id="medleyId" placeholder="UUID (総時間の自動取得に使用)" />
      </div>

      <div id="chunkCount" class="chunk-count" style="display:none"></div>

      <!-- ボタン -->
      <button class="btn btn-primary" id="startBtn">● キャプチャ開始</button>
      <button class="btn btn-danger"  id="stopBtn"  style="display:none">■ 停止</button>
      <button class="btn btn-secondary" id="analyzeBtn" style="display:none">✦ 解析 &amp; Anasui へ送信</button>

      <!-- 結果メッセージ -->
      <div id="resultInfo" style="display:none" class="info"></div>

      <!-- 設定トグル -->
      <span class="settings-toggle" id="settingsToggle">⚙ 詳細設定</span>
      <div class="settings-panel" id="settingsPanel">
        <div class="section">
          <label>MuQ Extractor URL</label>
          <input type="text" id="muqUrl" placeholder="http://localhost:8000" />
        </div>
        <div class="section">
          <label>Anasui URL</label>
          <input type="text" id="anasuiUrl" placeholder="http://localhost:3000" />
        </div>
        <button class="btn btn-secondary" id="saveSettingsBtn">保存</button>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
