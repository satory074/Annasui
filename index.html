<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>niconico外部プレイヤー</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; script-src 'self' 'unsafe-eval' https:; frame-src https:; style-src 'self' 'unsafe-inline';">
    <style>
        #playerContainer {
            width: 640px;
            height: 360px;
        }
        #controls {
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div id="playerContainer">
        <iframe
            width="640"
            height="360"
            src="https://embed.nicovideo.jp/watch/sm9"
            frameborder="0"
            allow="autoplay"
            allowfullscreen
        ></iframe>
    </div>
    <div id="controls">
        <button id="playPauseBtn">再生/停止</button>
        <span id="currentTime">0:00</span> / <span id="duration">0:00</span>
    </div>

    <script>
        const iframe = document.querySelector('iframe');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const currentTimeSpan = document.getElementById('currentTime');
        const durationSpan = document.getElementById('duration');

        playPauseBtn.addEventListener('click', () => {
            iframe.contentWindow.postMessage({ 
                eventName: 'play' 
            }, 'https://embed.nicovideo.jp');
        });

        window.addEventListener('message', (event) => {
            if (event.origin !== 'https://embed.nicovideo.jp') return;
            
            console.log('Received message:', event.data);
            // ここでイベントに応じて処理を行う
            // 例: 再生状態、現在の再生時間、動画の長さなどを更新
        });
    </script>
</body>
</html>
