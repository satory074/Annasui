<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>niconico外部プレイヤー</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval' https://ext.nicovideo.jp https://embed.nicovideo.jp; frame-src https://embed.nicovideo.jp;">
    <style>
        #playerContainer {
            width: 640px;
            height: 360px;
        }
        #controls {
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div id="playerContainer"></div>
    <div id="controls">
        <button id="playPauseBtn">再生/停止</button>
        <span id="currentTime">0:00</span> / <span id="duration">0:00</span>
    </div>

    <script>
        const videoId = 'sm9';
        let player;

        function checkNiconicoAPI() {
            if (typeof niconico !== 'undefined' && niconico.darkplayer) {
                console.log('Niconico API loaded');
                initPlayer();
            } else {
                console.log('Niconico API not loaded, retrying...');
                setTimeout(checkNiconicoAPI, 1000);
            }
        }

        function initPlayer() {
            console.log('niconico object:', niconico);
            console.log('darkplayer object:', niconico.darkplayer);

            if (typeof niconico !== 'undefined' && niconico.darkplayer) {
                player = niconico.darkplayer.create('playerContainer', {
                    width: '640px',
                    height: '360px',
                    video: videoId
                });

                const playPauseBtn = document.getElementById('playPauseBtn');
                const currentTimeSpan = document.getElementById('currentTime');
                const durationSpan = document.getElementById('duration');

                player.on('play', updatePlayPauseButton);
                player.on('pause', updatePlayPauseButton);
                player.on('timeupdate', updateTime);
                player.on('loadedmetadata', setDuration);

                playPauseBtn.addEventListener('click', togglePlayPause);
            } else {
                console.error('niconico player API not loaded');
                setTimeout(initPlayer, 1000); // Retry after 1 second
            }
        }

        function togglePlayPause() {
            if (player.paused) {
                player.play();
            } else {
                player.pause();
            }
        }

        function updatePlayPauseButton() {
            document.getElementById('playPauseBtn').textContent = player.paused ? '再生' : '停止';
        }

        function updateTime() {
            document.getElementById('currentTime').textContent = formatTime(player.currentTime);
        }

        function setDuration() {
            document.getElementById('duration').textContent = formatTime(player.duration);
        }

        function formatTime(time) {
            const minutes = Math.floor(time / 60);
            const seconds = Math.floor(time % 60);
            return `${minutes}:${seconds.toString().padStart(2, '0')}`;
        }

        // Load niconico player API
        const script = document.createElement('script');
        script.src = `https://ext.nicovideo.jp/thumb_watch/${videoId}`;
        script.onload = checkNiconicoAPI;
        document.body.appendChild(script);
    </script>
</body>
</html>
